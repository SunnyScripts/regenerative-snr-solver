<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tissue Generative Debugger</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
<div id="ui">
    <h2>Tissue Debug Viewer</h2>
    <p id="status">Loading geometry...</p>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. SCENE SETUP
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 4000);
    camera.position.set(0, 150, 200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. CAMERA CONTROLS
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Smooth inertia

    // 3. COLOR DICTIONARY
    const typeColors = {
        1: new THREE.Color('#00ffff'), // Basal
        2: new THREE.Color('#ff00ff'), // Spinous
        3: new THREE.Color('#ffff00'), // Granular
        4: new THREE.Color('#ffffff')  // Unassigned
    };

    // 4. FETCH AND RENDER JSON
    async function loadTissue() {
        try {
            // Fetch the JSON generated by your Rust/Node engine
            const response = await fetch('./synthetic_tissue.json');
            const data = await response.json();

            const nodeCount = data.length;
            document.getElementById('status').innerText = `Nodes Rendered: ${nodeCount}`;

            // Create the InstancedMesh for high performance
            const geometry = new THREE.SphereGeometry(2.0, 8, 8);
            const material = new THREE.MeshBasicMaterial();
            const instancedMesh = new THREE.InstancedMesh(geometry, material, nodeCount);

            const dummy = new THREE.Object3D();

            data.forEach((node, i) => {
                // Set Position
                dummy.position.set(node.x, node.y, node.z);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);

                // Set Color
                const color = typeColors[node.type] || typeColors[4];
                instancedMesh.setColorAt(i, color);
            });

            scene.add(instancedMesh);

        } catch (error) {
            document.getElementById('status').innerText = "Error: Could not load test_tissue_01.json. Is your local server running?";
            console.error(error);
        }
    }

    loadTissue();

    // 5. ANIMATION LOOP
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Handle window resizing
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
